    background-position:center 35%;
    filter:grayscale(1) contrast(1.05);
    opacity:0.16;
    z-index:-1;
    pointer-events:none;
  }

  .viewport-shell{
    display:flex;flex-direction:column;
  }

  /* ---------- navbar ---------- */
  .navbar{
    background:var(--surface);
    border-bottom:1px solid var(--border);
    position:relative;
    flex:none;
  }
  .nav-inner{
    max-width:1240px;margin:0 auto;
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:16px;
    padding:14px clamp(4px,1vw,12px);
  }
  .brand{justify-self:start;}
  .nav-actions{justify-self:end;}
  .brand{display:flex;align-items:center;gap:10px;}
  .logo-mark{
    width:34px;height:34px;flex:none;
    border-radius:9px;
    background:var(--red);
    position:relative;overflow:hidden;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06), 0 6px 14px -6px rgba(51,78,172,0.4);
  }
  .logo-mark svg{position:absolute;inset:0;}
  .brand-text{display:flex;flex-direction:column;line-height:1.1;}
  .brand-name{font-size:1.05rem;font-weight:800;letter-spacing:-0.01em;}
  .brand-sub{font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.12em;color:var(--text-muted);text-transform:uppercase;}

  .nav-links{display:flex;gap:clamp(18px,3vw,30px);justify-self:center;}
  .nav-links a, .nav-links .nav-link-btn{
    font-size:0.92rem;font-weight:600;text-decoration:none;
    color:var(--text);opacity:0.75;transition:opacity .15s ease, color .15s ease;
    background:none;border:none;padding:0;font-family:var(--font-kr);cursor:pointer;min-height:auto;
  }
  .nav-links a:hover, .nav-links .nav-link-btn:hover{opacity:1;color:var(--red);}
  @media (max-width:880px){ .nav-links{display:none;} }

  .nav-actions{display:flex;align-items:center;gap:12px;}
  .theme-toggle{
    width:40px;height:40px;flex:none;border-radius:50%;
    border:1px solid var(--border);background:var(--surface);
    display:flex;align-items:center;justify-content:center;
    color:var(--text);cursor:pointer;
  }
  .theme-toggle svg{display:block;}
  .nav-cta{
    font-family:var(--font-kr);font-weight:700;font-size:0.88rem;
    padding:10px 18px;border-radius:999px;
    border:1px solid var(--red-deep);
    background:linear-gradient(135deg, var(--red) 0%, var(--red-deep) 100%);
    color:#F7F2EB;cursor:pointer;white-space:nowrap;
    min-height:44px;
    transition:filter .15s ease, transform .12s ease;
  }
  .nav-cta:hover{filter:brightness(1.08);transform:translateY(-1px);}
  @media (max-width:480px){ .nav-cta{padding:10px 13px;font-size:0.82rem;} }

  /* ---------- hero ---------- */
  .hero{
    flex:1 0 auto;
    min-height:620px;
    display:flex;position:relative;
    background:
      radial-gradient(720px 420px at 88% -8%, var(--green-soft) 0%, transparent 62%),
      radial-gradient(640px 380px at -6% 8%, var(--red-soft) 0%, transparent 60%);
  }
  .hero-inner{
    position:relative;z-index:1;
    width:100%;max-width:900px;margin:0 auto;
    padding:clamp(28px,6vw,48px) clamp(16px,4vw,32px);
    display:flex;flex-direction:column;align-items:center;height:100%;
  }

  .hero-left{
    display:flex;flex-direction:column;align-items:center;
    text-align:center;
    max-width:640px;
    flex:1;width:100%;
    margin-bottom:clamp(16px,5vh,44px);
  }

  .hero-headline{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;
  }

  /* ---------- tool section ---------- */
  .tool-section{
    background:transparent;
    display:flex;justify-content:center;
  }
  .tool-section-inner{
    width:100%;max-width:520px;margin:0 auto;
    padding:0 clamp(16px,4vw,32px) clamp(48px,8vw,80px);
  }

  .hero h1{
    font-size:clamp(2rem,1.5rem + 4vw,5rem);
    font-weight:800;letter-spacing:-0.02em;line-height:1.15;
    margin:0 0 16px;text-wrap:balance;color:var(--text);
    text-align:center;
    white-space:nowrap;
  }
  .accent-word{color:var(--red);position:relative;}
  .accent-word::after{
    content:"";position:absolute;left:-2%;right:-2%;bottom:0.04em;height:0.22em;
    background:var(--green-soft);border-radius:3px;z-index:-1;
  }
  .hero-sub{
    margin:0 0 28px;color:var(--text-muted);
    font-size:clamp(1.25rem,1.05rem + 0.6vw,1.55rem);
    max-width:52ch;
    text-align:center;
  }

  .hero-cta-row{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin:clamp(16px,3vw,28px) 0 clamp(32px,6vw,48px);}
  .cta-primary, .cta-secondary{
    display:inline-flex;align-items:center;justify-content:center;gap:9px;
    font-family:var(--font-kr);font-weight:700;font-size:1.15rem;
    padding:16px 26px;border-radius:var(--radius-md);
    cursor:pointer;min-height:52px;text-decoration:none;
    transition:filter .15s ease, transform .12s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .cta-primary{
    border:1px solid var(--red-deep);
    background:linear-gradient(135deg, var(--red) 0%, var(--red-deep) 100%);
    color:#F7F2EB;
    box-shadow:0 8px 20px -8px rgba(51,78,172,0.5);
  }
  .cta-primary:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 10px 22px -6px rgba(51,78,172,0.55);}
  .cta-secondary{
    border:1px solid var(--border);background:var(--surface);color:var(--text);
  }
  .cta-secondary:hover{border-color:var(--red);transform:translateY(-1px);}
  @media (max-width:480px){
    .cta-primary, .cta-secondary{width:100%;}
  }

  .stat-row{display:grid;grid-template-columns:repeat(4,auto);gap:clamp(18px,4vw,32px);margin-top:clamp(20px,4vw,32px);}
  @media (max-width:640px){ .stat-row{grid-template-columns:repeat(2,1fr);} }
  .stat-num{display:block;font-size:1.5rem;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums;}
  .stat-label{display:block;font-size:0.78rem;color:var(--text-muted);margin-top:2px;}

  /* ---------- quote card ---------- */
  .quote-card{
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius-lg);box-shadow:var(--shadow);
    padding:clamp(20px,3vw,28px);
    display:flex;flex-direction:column;gap:20px;
    position:relative;overflow:hidden;
  }
  .quote-card::before{
    content:"";position:absolute;top:0;left:0;right:0;height:4px;
    background:linear-gradient(90deg, var(--red) 0%, var(--green) 100%);
  }
  .quote-card-head h2{margin:0 0 4px;font-size:1.15rem;font-weight:800;color:var(--text);}
  .quote-card-head p{margin:0;color:var(--text-muted);font-size:0.86rem;}

  .quote-field{display:flex;flex-direction:column;gap:8px;}
  .field-concept{display:none;}

  /* ---------- entertainment mode ---------- */
  @keyframes rainbowShift{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
  }
  body.entertainment-mode{
    background:linear-gradient(120deg,#ff9a9e,#fad0c4,#fbc2eb,#a6c1ee,#84fab0,#8fd3f4,#fddb92,#ff9a9e);
    background-size:400% 400%;
    animation:rainbowShift 16s ease infinite;
  }
  @media (prefers-reduced-motion: reduce){ body.entertainment-mode{animation:none;} }
  body.entertainment-mode .hero{
    background:
      radial-gradient(720px 420px at 88% -8%, rgba(255,255,255,0.4) 0%, transparent 62%),
      radial-gradient(640px 380px at -6% 8%, rgba(255,255,255,0.3) 0%, transparent 60%);
  }
  body.entertainment-mode .field-relation,
  body.entertainment-mode .field-tone,
  body.entertainment-mode .field-firm,
  body.entertainment-mode .field-diffactions,
  body.entertainment-mode #diffDetail{
    display:none;
  }
  body.entertainment-mode .field-concept{
    display:flex;
  }
  .field-label{
    font-size:0.72rem;font-weight:700;letter-spacing:0.06em;
    color:var(--text-muted);text-transform:uppercase;
  }

  .select-wrap{position:relative;}
  .select-wrap svg{
    position:absolute;right:14px;top:50%;transform:translateY(-50%);
    pointer-events:none;color:var(--text-muted);
  }
  select{
    width:100%;appearance:none;-webkit-appearance:none;-moz-appearance:none;
    font-family:var(--font-kr);font-size:0.96rem;color:var(--text);
    padding:12px 40px 12px 14px;
    border-radius:var(--radius-md);border:1px solid var(--border);
    background:var(--surface);cursor:pointer;min-height:46px;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  select:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--green-soft);outline:none;}

  textarea{
    width:100%;resize:vertical;min-height:110px;
    font-family:var(--font-kr);font-size:0.96rem;line-height:1.6;
    padding:12px 14px;border-radius:var(--radius-md);
    border:1px solid var(--border);background:var(--surface);color:var(--text);
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  textarea:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--green-soft);outline:none;}
  textarea::placeholder{color:var(--text-muted);}

  .tone-header{display:flex;align-items:baseline;justify-content:space-between;gap:8px;}
  .tone-value{font-family:var(--font-mono);font-size:0.78rem;color:var(--red);font-weight:600;}
  input[type="range"]{
    -webkit-appearance:none;appearance:none;
    width:100%;height:8px;border-radius:999px;
    background:linear-gradient(to right, var(--red) 0%, var(--green) 100%);
    outline:none;margin:8px 0 2px;
  }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none;width:22px;height:22px;border-radius:50%;
    background:var(--surface);border:3px solid var(--red);
    box-shadow:0 2px 6px rgba(0,0,0,0.22);cursor:pointer;
    transition:box-shadow .15s ease, transform .1s ease;
  }
  input[type="range"]:hover::-webkit-slider-thumb,
  input[type="range"]:focus-visible::-webkit-slider-thumb{
    box-shadow:0 2px 6px rgba(0,0,0,0.22), 0 0 0 6px var(--green-ring);
  }
  input[type="range"]::-webkit-slider-thumb:active{transform:scale(1.08);}
  input[type="range"]::-moz-range-thumb{
    width:22px;height:22px;border-radius:50%;
    background:var(--surface);border:3px solid var(--red);
    box-shadow:0 2px 6px rgba(0,0,0,0.22);cursor:pointer;
  }
  .tone-scale{display:flex;justify-content:space-between;font-size:0.78rem;color:var(--text-muted);}

  .segmented{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
  .segmented button{
    font-family:var(--font-kr);font-weight:600;font-size:0.9rem;
    padding:10px 8px;border-radius:var(--radius-sm);
    border:1px solid var(--border);background:var(--surface-alt);color:var(--text);
    cursor:pointer;min-height:44px;
    transition:background .15s ease,color .15s ease,border-color .15s ease;
  }
  .segmented button.active{
    background:var(--red);border-color:var(--red);color:#F7F2EB;
    box-shadow:0 6px 14px -6px rgba(51,78,172,0.5);
  }

  select:focus-visible, textarea:focus-visible, input:focus-visible, button:focus-visible{
    outline:2px solid var(--red);outline-offset:2px;
  }

  .result-box{
    background:var(--green-soft);border:1px solid var(--green-ring);
    border-radius:var(--radius-md);padding:16px;
  }
  .result-box-label{
    display:block;font-size:0.7rem;font-weight:700;letter-spacing:0.08em;
    text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;
  }
  .result-box-text{
    margin:0 0 10px;font-size:0.96rem;font-weight:600;color:var(--text);
    line-height:1.6;white-space:pre-wrap;
  }
  .result-box-text.is-placeholder{color:var(--text-muted);font-weight:500;}
  .result-box-text mark{
    background:var(--red);color:#F7F2EB;border-radius:4px;padding:0 3px;text-decoration:none;
  }
  .diff-toggle{
    background:none;border:none;padding:2px 0;
    color:var(--red);font-family:var(--font-kr);font-size:0.84rem;font-weight:700;
    cursor:pointer;text-decoration:underline;min-height:auto;
  }

  .result-box-actions{
    display:flex;flex-wrap:wrap;align-items:center;gap:14px;margin-top:2px;
  }
  .copy-button{
    display:inline-flex;align-items:center;gap:6px;
    background:none;border:none;padding:2px 0;
    color:var(--red);font-family:var(--font-kr);font-size:0.84rem;font-weight:700;
    cursor:pointer;min-height:auto;
  }
  .copy-button:hover{text-decoration:underline;}
  .copy-button.is-copied{color:var(--green-strong);}

  .diff-detail{
    border-top:1px solid var(--border);padding-top:16px;
    animation:fadeIn .3s ease;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
  @media (prefers-reduced-motion: reduce){ .diff-detail{animation:none;} }
  .result-legend{display:flex;gap:16px;flex-wrap:wrap;font-size:0.76rem;color:var(--text-muted);margin-bottom:12px;}
  .result-legend span{display:inline-flex;align-items:center;gap:6px;}
  .legend-dot{width:9px;height:9px;border-radius:50%;background:var(--green);display:inline-block;}
  .legend-dot.del{background:var(--del);}
  .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media (max-width:520px){ .result-grid{grid-template-columns:1fr;} }
  .result-col{display:flex;flex-direction:column;gap:6px;min-width:0;}
  .result-label{font-size:0.66rem;font-weight:700;letter-spacing:0.1em;color:var(--text-muted);}
  .mono{font-family:var(--font-mono);}
  .result-text{
    border:1px solid var(--border);border-radius:var(--radius-md);padding:12px;
    font-size:0.88rem;line-height:1.6;white-space:pre-wrap;background:var(--surface-alt);
  }
  .result-text del{
    background:var(--del-soft);color:var(--del);border-radius:4px;padding:0 3px;text-decoration:line-through;
  }

  .run-button{
    display:inline-flex;align-items:center;justify-content:center;gap:9px;
    font-family:var(--font-kr);font-weight:700;font-size:1rem;
    padding:14px 22px;border-radius:var(--radius-md);
    border:1px solid var(--red-deep);
    background:linear-gradient(135deg, var(--red) 0%, var(--red-deep) 100%);
    color:#F7F2EB;cursor:pointer;width:100%;
    transition:filter .15s ease, transform .12s ease, box-shadow .15s ease;
    min-height:48px;box-shadow:0 8px 20px -8px rgba(51,78,172,0.5);
  }
  .run-button:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 10px 22px -6px rgba(51,78,172,0.55);}
  .run-button:active{transform:scale(0.99);}
  .run-button[disabled]{opacity:0.7;cursor:progress;transform:none;}
  .run-button svg{flex:none;transition:transform .15s ease;}
  .run-button:hover svg{transform:translateX(2px);}

  .foot{
    text-align:center;color:var(--text-muted);font-size:0.82rem;
    padding:24px 16px 40px;
  }

  /* ---------- mobile readability ---------- */
  @media (max-width:480px){
    body{font-size:16px;}
    .hero h1{font-size:clamp(1.15rem,6.2vw,2.4rem);}
    .field-label{font-size:0.78rem;}
    .tone-value{font-size:0.85rem;}
    .tone-scale{font-size:0.82rem;}
    .result-label{font-size:0.74rem;}
    .result-legend{font-size:0.82rem;}
    .result-text{font-size:0.94rem;}
    .result-box-text{font-size:0.94rem;}
    .foot{font-size:0.86rem;}
    .hero-sub{font-size:1.05rem;}
  }
</style>
</head>

<script>
(function(){
  var state = { relation:'boss', formality:70, firm:false, concept:'y2k', entertainment:false };

  var RELATION_LABEL = { boss:'직속 상사', exec:'임원', dept:'타 부서 담당자', global:'해외 지사 담당자' };
  var CONCEPT_LABEL = { y2k:'Y2K', genz:'Gen-Z', garu:'갸루' };
  var PLACEHOLDER = {
    boss:'팀장님 저 그거 아직 못했는데 내일까지 하면 될까요?',
    exec:'이사님 그 보고서 관련해서 제 생각엔 이렇게 하면 좋을 거 같아요',
    dept:'그쪽 자료 언제쯔음 받을 수 있을까요? 저희도 좀 급해서요',
    global:'Hey, can you send me the updated numbers asap? thanks!'
  };

  var relationSelect = document.getElementById('relationSelect');
  var conceptSelect = document.getElementById('conceptSelect');
  var draftInput = document.getElementById('draftInput');
  var toneSlider = document.getElementById('toneSlider');
  var toneValue = document.getElementById('toneValue');
  var firmSegment = document.getElementById('firmSegment');
  var runButton = document.getElementById('runButton');
  var runButtonLabel = document.getElementById('runButtonLabel');
  var summaryChip = document.getElementById('summaryChip');
  var resultBoxText = document.getElementById('resultBoxText');
  var diffToggle = document.getElementById('diffToggle');
  var copyButton = document.getElementById('copyButton');
  var diffDetail = document.getElementById('diffDetail');
  var beforeText = document.getElementById('beforeText');
  var afterText = document.getElementById('afterText');
  var currentRevised = '';
  var themeToggle = document.getElementById('themeToggle');
  var iconMoon = document.getElementById('iconMoon');
  var iconSun = document.getElementById('iconSun');
  var navCta = document.getElementById('navCta');
  var heroCta = document.getElementById('heroCta');
  var entertainmentToggle = document.getElementById('entertainmentToggle');

  function toneWord(v){
    if (v >= 55) return '정중하게';
    if (v <= 25) return '캐주얼하게';
    return '기본 톤으로';
  }

  function updateToneLabel(){
    toneValue.textContent = toneWord(state.formality) + ' ' + state.formality + '%';
  }

  function updateSummary(){
    if (state.entertainment){
      summaryChip.textContent = CONCEPT_LABEL[state.concept] + ' 컨셉으로 다듬는 중';
      return;
    }
    summaryChip.textContent = RELATION_LABEL[state.relation] + '께 · ' + toneWord(state.formality) +
      ' ' + state.formality + '% · 단호함 ' + (state.firm ? 'ON' : 'OFF');
  }

  relationSelect.addEventListener('change', function(){
    state.relation = relationSelect.value;
    draftInput.placeholder = PLACEHOLDER[state.relation];
    updateSummary();
  });

  conceptSelect.addEventListener('change', function(){
    state.concept = conceptSelect.value;
    updateSummary();
  });

  entertainmentToggle.addEventListener('click', function(){
    state.entertainment = !state.entertainment;
    document.body.classList.toggle('entertainment-mode', state.entertainment);
    entertainmentToggle.textContent = state.entertainment ? '일반 모드' : '엔터테인먼트';
    diffDetail.setAttribute('hidden', 'true');
    diffToggle.setAttribute('hidden', 'true');
    diffToggle.textContent = '원문과 비교하기';
    updateSummary();
    syncLayout();
  });

  toneSlider.addEventListener('input', function(){
    state.formality = Number(toneSlider.value);
    updateToneLabel();
    updateSummary();
  });

  firmSegment.addEventListener('click', function(e){
    var btn = e.target.closest('button');
    if (!btn) return;
    firmSegment.querySelectorAll('button').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    state.firm = btn.dataset.firm === 'true';
    updateSummary();
  });

  function scrollToTool(){
    var card = document.getElementById('quoteCard');
    var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    card.scrollIntoView({ behavior: reduceMotion ? 'auto' : 'smooth', block: 'start' });
    setTimeout(function(){ draftInput.focus(); }, reduceMotion ? 0 : 500);
  }
  function scrollToHome(){
    var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    document.body.scrollIntoView({ behavior: reduceMotion ? 'auto' : 'smooth', block: 'start' });
  }
  navCta.addEventListener('click', scrollToHome);
  heroCta.addEventListener('click', scrollToTool);

  themeToggle.addEventListener('click', function(){
    var root = document.documentElement;
    var current = root.getAttribute('data-theme');
    var isDark = current === 'dark' || (!current && window.matchMedia('(prefers-color-scheme: dark)').matches);
    var next = isDark ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    iconMoon.hidden = next === 'dark';
    iconSun.hidden = next !== 'dark';
  });

  function polishKorean(text, formality, firm){
    var s = text.trim();

    var reportingPhrases = [
      [/아직\s*(다\s*)?못\s*(했|한|하고\s*있)\S*/g, '현재 절반 정도 진행됐고, 나머지는 금요일까지 끝낼 예정입니다'],
      [/그냥\s*(했|함|진행했|해)\S*/g, '지침에 따라 검토했고, 그 결과 이렇게 진행했습니다'],
      [/(안\s*(됩니다|될\s*것\s*같|되겠|돼요)|어려울\s*것\s*같|힘들\s*것\s*같|불가능(합니다|해요))\S*/g, '지금 방식으로는 어려울 것 같습니다. 대신 이런 방법을 제안드립니다'],
      [/(잘\s*)?모르겠\S*|잘\s*모르\S*/g, '확인 후 오후 3시까지 보고드리겠습니다'],
      [/잘\s*(되고|진행되고|하고)\s*있\S*/g, '이번 주 일정은 순조롭게 진행되고 있습니다'],
      [/(시킨|말씀하신|지시하신|말씀\s*주신)\s*대로\s*(했|함|진행했)\S*/g, '말씀 주신 대로 진행했고, 추가 개선 사항도 반영했습니다'],
      [/(아닌|다를|틀린)\s*것\s*같\S*/g, '이런 방식으로 함께 검토해보면 어떨까요?']
    ];
    reportingPhrases.forEach(function(r){ s = s.replace(r[0], r[1]); });

    var replacements = [
      [/못했는데/g, '완료하지 못했는데'],
      [/될까요\??/g, '괜찮을지 여쭤봐도 될까요?'],
      [/할까요\??/g, '가능할지 여쭤봐도 될까요?'],
      [/해줘요/g, '해주시면 감사하겠습니다'],
      [/해줘/g, '해주시겠어요'],
      [/알겠어요?/g, '확인했습니다'],
      [/고마워요?/g, '감사합니다'],
      [/미안해요?/g, '죄송합니다'],
      [/그거/g, '해당 사항'],
      [/이거/g, '이 부분'],
      [/거\s?같아요/g, '것 같습니다'],
      [/있어요/g, '있습니다'],
      [/없어요/g, '없습니다']
    ];

    if (formality >= 45){
      replacements.forEach(function(r){ s = s.replace(r[0], r[1]); });
    }
    if (formality >= 70){
      s = s.replace(/해요/g, '합니다').replace(/이에요/g, '입니다').replace(/예요/g, '입니다');
    }
    if (firm){
      s = s.replace(/혹시\s?/g, '').replace(/괜찮으시다면\s?/g, '').replace(/것\s?같습니다/g, '입니다').replace(/\s?좀\s/g, ' ');
    } else {
      s = s.replace(/\s?좀\s/g, ' 조금 ');
    }

    s = s.replace(/\s+/g, ' ').trim();
    if (!/[.?!]$/.test(s)) s += '.';

    if (formality >= 40){
      var greeting = {
        boss:'팀장님, 안녕하세요.\n',
        exec:'안녕하세요, 이사님.\n',
        dept:'안녕하세요, 담당자님.\n'
      }[state.relation];
      if (greeting) s = greeting + s;
    }
    if (formality >= 60){
      var closing = {
        boss:'\n감사합니다.',
        exec:'\n바쁘신 와중에 확인해주셔서 감사합니다.',
        dept:'\n확인 부탁드립니다. 감사합니다.'
      }[state.relation];
      if (closing) s += closing;
    }
    return s;
  }

  function polishGlobal(text, formality, firm){
    var s = text.trim();
    var replacements = [
      [/\bhey\b/gi, 'Hello'],
      [/\bcan you\b/gi, 'Could you please'],
      [/\basap\b/gi, 'at your earliest convenience'],
      [/\bthanks!?\b/gi, 'Thank you.'],
      [/!/g, '.']
    ];
    replacements.forEach(function(r){ s = s.replace(r[0], r[1]); });
    s = s.replace(/\s+/g, ' ').trim();
    if (!/[.?!]$/.test(s)) s += '.';
    if (firm) s = s.replace(/\bmight\b/gi, 'will').replace(/\bI think\s?/gi, '');
    if (formality >= 40) s = 'Dear Team,\n\n' + s;
    if (formality >= 60) s += '\n\nBest regards.';
    return s;
  }

  function polishGenZ(text){
    var s = text.trim();
    var subs = [
      [/정말로?|진짜로?/g, 'ㄹㅇ'],
      [/알겠습니다|알겠어요|알겠어|알았어요?/g, 'ㅇㅋㅇㅋㅇㅋ'],
      [/맞습니다|맞아요|맞아/g, 'ㅇㅈ'],
      [/대박|최고예요?|최고입니다/g, '개대박'],
      [/화나요?|짜증나요?|열받아요?/g, '킹받네'],
      [/미안해요?|죄송합니다|죄송해요/g, '아 미안 ㅋㅋ'],
      [/좋아요|좋습니다/g, '개꿀'],
      [/힘들어요?|힘듭니다/g, '현타옴'],
      [/모르겠어요?|모르겠습니다/g, '나도 모르겠음 ㄹㅇ'],
      [/부끄러워요?|창피해요?/g, '갑분싸'],
      [/당황했어요?|당황스러워요?/g, '뇌절'],
      [/해줘요?|해주세요/g, '해줘라 진짜'],
      [/그거|저거/g, '그거 flex'],
      [/합니다|해요/g, '함'],
      [/입니다|이에요|예요/g, '임']
    ];
    subs.forEach(function(r){ s = s.replace(r[0], r[1]); });
    s = s.replace(/[.]+/g, ' ㅋㅋ').replace(/!+/g, ' ㄹㅇ!').replace(/\?+/g, '? 인정?');
    s = s.replace(/\s+/g, ' ').trim();
    if (!/(ㅋ|ㅇㅈ|!|\?)$/.test(s)) s += ' ㄹㅇ';
    return s;
  }

  function polishGaru(text){
    var s = text.trim().replace(/[.!?]+$/g, '');
    var endings = [
      [/습니다$/, '스무니다'], [/합니다$/, '하무니다'], [/됩니다$/, '되무니다'],
      [/있습니다$/, '있스무니다'], [/없습니다$/, '없스무니다'],
      [/해요$/, '하무니다'], [/이에요$/, '이무니다'], [/예요$/, '무니다'],
      [/어요$/, '어무니다'], [/아요$/, '아무니다']
    ];
    var matched = false;
    for (var i = 0; i < endings.length; i++){
      if (endings[i][0].test(s)){ s = s.replace(endings[i][0], endings[i][1]); matched = true; break; }
    }
    if (!matched) s += '이무니다';
    s = '저는 사람이 아니무니다, 갸루상이무니다^^ ' + s + '^^';
    return s;
  }

  function polishY2K(text){
    var s = text.trim().replace(/[.!?]+$/g, '');
    var endings = [
      [/습니다$/, '슴당~'], [/합니다$/, '해용~'], [/해요$/, '해용~'],
      [/이에요$/, '이에용~'], [/예요$/, '예용~'],
      [/어요$/, '어용~'], [/아요$/, '아용~']
    ];
    var matched = false;
    for (var i = 0; i < endings.length; i++){
      if (endings[i][0].test(s)){ s = s.replace(endings[i][0], endings[i][1]); matched = true; break; }
    }
    if (!matched) s += '이자나~';
    s = s.replace(/잖아요?/g, '자나');
    s += ' ㅠㅠ 완전 대박이자나 (｡･∀･)ﾉﾞ☆';
    return s;
  }

  function polishConcept(text, concept){
    if (concept === 'genz') return polishGenZ(text);
    if (concept === 'garu') return polishGaru(text);
    return polishY2K(text);
  }

  function polish(text){
    if (state.entertainment) return polishConcept(text, state.concept);
    if (state.relation === 'global') return polishGlobal(text, state.formality, state.firm);
    return polishKorean(text, state.formality, state.firm);
  }

  function diffWords(a, b){
    var n = a.length, m = b.length;
    var dp = [];
    for (var i = 0; i <= n; i++) dp.push(new Array(m + 1).fill(0));
    for (i = n - 1; i >= 0; i--){
      for (var j = m - 1; j >= 0; j--){
        dp[i][j] = a[i] === b[j] ? dp[i+1][j+1] + 1 : Math.max(dp[i+1][j], dp[i][j+1]);
      }
    }
    var ops = [];
    i = 0; j = 0;
    while (i < n && j < m){
      if (a[i] === b[j]){ ops.push(['eq', a[i]]); i++; j++; }
      else if (dp[i+1][j] >= dp[i][j+1]){ ops.push(['del', a[i]]); i++; }
      else { ops.push(['ins', b[j]]); j++; }
    }
    while (i < n){ ops.push(['del', a[i]]); i++; }
    while (j < m){ ops.push(['ins', b[j]]); j++; }
    return ops;
  }

  function escapeHtml(str){
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderDiff(original, revised){
    var a = original.split(/\s+/).filter(Boolean);
    var b = revised.split(/\s+/).filter(Boolean);
    var ops = diffWords(a, b);
    var beforeHtml = [], afterHtml = [];
    ops.forEach(function(op){
      var word = escapeHtml(op[1]);
      if (op[0] === 'eq'){ beforeHtml.push(word); afterHtml.push(word); }
      else if (op[0] === 'del'){ beforeHtml.push('<del>' + word + '</del>'); }
      else { afterHtml.push('<mark>' + word + '</mark>'); }
    });
    return { before: beforeHtml.join(' '), after: afterHtml.join(' ') };
  }

  diffToggle.addEventListener('click', function(){
    var isHidden = diffDetail.hasAttribute('hidden');
    if (isHidden){
      diffDetail.removeAttribute('hidden');
      diffToggle.textContent = '비교 닫기';
    } else {
      diffDetail.setAttribute('hidden', 'true');
      diffToggle.textContent = '원문과 비교하기';
    }
  });

  copyButton.addEventListener('click', function(){
    if (!currentRevised) return;
    var done = function(){
      copyButton.classList.add('is-copied');
      copyButton.lastChild.textContent = ' 복사됨!';
      setTimeout(function(){
        copyButton.classList.remove('is-copied');
        copyButton.lastChild.textContent = ' 결과 복사하기';
      }, 1500);
    };
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(currentRevised).then(done);
    } else {
      var temp = document.createElement('textarea');
      temp.value = currentRevised;
      document.body.appendChild(temp);
      temp.select();
      document.execCommand('copy');
      document.body.removeChild(temp);
      done();
    }
  });

  runButton.addEventListener('click', function(){
    var original = draftInput.value.trim();
    if (!original){
      draftInput.focus();
      draftInput.style.borderColor = 'var(--del)';
      setTimeout(function(){ draftInput.style.borderColor = ''; }, 900);
      return;
    }
    runButton.setAttribute('disabled', 'true');
    runButtonLabel.textContent = '다듬는 중...';

    setTimeout(function(){
      var revised = polish(original);
      currentRevised = revised;
      var diff = renderDiff(original, revised);
      resultBoxText.classList.remove('is-placeholder');
      resultBoxText.innerHTML = diff.after;
      beforeText.innerHTML = diff.before;
      afterText.innerHTML = diff.after;
      diffToggle.removeAttribute('hidden');
      copyButton.removeAttribute('hidden');
      runButton.removeAttribute('disabled');
      runButtonLabel.textContent = '다듬기';
    }, 550);
  });

  draftInput.placeholder = PLACEHOLDER[state.relation];
  updateToneLabel();
  updateSummary();

  // 실제 브라우저 뷰포트 높이만큼 hero를 채워서, 처음 진입 시 입력 칸(quoteCard)이
  // 스크롤 없이는 보이지 않도록 함
  var heroEl = document.querySelector('.hero');
  var navbarEl = document.querySelector('.navbar');
  function setHeroMinHeight(){
    if (!heroEl) return;
    var vh = window.innerHeight;
    try {
      if (window.top && window.top !== window && window.top.innerHeight) {
        vh = window.top.innerHeight;
      }
    } catch(e){}
    var navH = navbarEl ? navbarEl.offsetHeight : 0;
    heroEl.style.minHeight = Math.max(vh - navH, 480) + 'px';
  }

  // Streamlit components.html iframe에 맞춰 실제 콘텐츠 높이로 자동 리사이즈
  function resizeParentFrame(){
    try {
      var fe = window.frameElement;
      if (fe) fe.style.height = document.documentElement.scrollHeight + 'px';
    } catch(e){}
  }

  function syncLayout(){
    setHeroMinHeight();
    resizeParentFrame();
  }

  window.addEventListener('load', syncLayout);
  window.addEventListener('resize', syncLayout);
  if (window.ResizeObserver){
    new ResizeObserver(resizeParentFrame).observe(document.body);
  }
  setTimeout(syncLayout, 300);
})();
</script>
